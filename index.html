<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coastline Orange Hotel - Menü Ekranı</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; 
            width: 100vw;
            margin: 0;
            overflow: hidden;
            color: white;
            background: var(--base-bg, #1550b0);
            transition: background 2s ease;
        }

        body.theme-day {
            --base-bg: #1550b0;
            --bg-gradient: linear-gradient(135deg, #3db6f2 0%, #3d7ff2 35%, #3df2bc 60%, #fc03f8 100%);
        }

        body.theme-night {
            --base-bg: #2a405e;
            --bg-gradient: linear-gradient(135deg, #2a405e 0%, #080f1d 30%, #1c263d 60%, #3a4d7c 100%);
        }

        .background {
            position: fixed;
            /* Kayma esnasında açık vermemesi için sadece %15 büyük yapıyoruz */
            top: -15%;
            left: -15%;
            width: 130%;
            height: 130%;
            overflow: hidden;
            z-index: -1;
            background: var(--bg-gradient, linear-gradient(135deg, #04162c 0%, #08345f 35%, #0b4f7d 60%, #ff7a00 100%));
            transition: background 2s ease;
            
            /* DÖNME YOK: Sadece renkleri yavaşça kaydıran sıvı akış efekti */
            animation: gradientWave 20s ease-in-out infinite;
            will-change: transform;
            transform: translateZ(0);
        }

        .particles-container { position: fixed; inset: 0; z-index: -10; pointer-events: none; }

        .particle {
            position: absolute; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; opacity: 0; animation: randomGlow ease-in-out infinite;
        }

        .dashboard {
            position: relative;
            z-index: 10; 
            height: 100%;
            padding: 1.5vh 1.5vw; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            gap: 15px;
            transform: scale(0.92);
            transform-origin: center center; 
        }

        .header {
            height: 150px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0 30px; 
            border-radius: 28px; 
            background: var(--glass);
            backdrop-filter: blur(30px); 
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 40px rgba(0,0,0,.20);
        }

        .tv-bug-container { height: 130px; width: 320px; overflow: hidden; display: flex; align-items: flex-start; }
        .tv-bug-logo { width: 80%; height: 190px; object-fit: cover; object-position: top center; margin-top: -5px; will-change: transform, filter; }

        .clocks { 
            display: flex; gap: 45px; 
            contain: layout paint; 
        }
        .clock-card { 
            min-width: 195px; text-align: center; padding: 14px 18px; border-radius: 29px; 
            background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); 
        }
        .clock-city { font-size: 25px; opacity: .7; letter-spacing: 5px; margin-bottom: 4px; }
        .clock-time { font-size: 45px; font-weight: 700; }

        .main-panel {
            flex: 1; position: relative; border-radius: 34px; overflow: hidden;
            background: rgba(255,255,255,.06); backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,.10); display: flex; justify-content: center; align-items: center;
            perspective: 1000px; 
        }

        .slider { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 2; }

        .slide { 
            position: absolute; width: 100%; height: 100%; display: flex; flex-direction: row; 
            justify-content: center; align-items: center; padding-bottom: 110px; 
            opacity: 0; transform: translateY(30px) scale(0.9); 
            transition: opacity 0.3s ease, transform 0.3s ease; 
            pointer-events: none;
        }

        .slide.active { 
            opacity: 1; transform: translateY(0) scale(1); 
            transition: opacity 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s, transform 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s; 
            pointer-events: auto;
        }

        .split-half { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 0 20px; }
        .right-half { border-left: 1px solid rgba(255, 255, 255, 0.15); }
        .slide-content { position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; }
         
        .slide img { width: 240px; height: 170px; object-fit: cover; border-radius: 20%; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 3px solid rgba(255,255,255,0.2); animation: float 4s ease-in-out infinite; }
        .slide h1 { font-size: 38px; font-weight: 900; letter-spacing: 2px; margin-bottom: 12px; text-shadow: 0 10px 20px rgba(0,0,0,0.4); display: flex; flex-wrap: wrap; justify-content: center; text-align: center; }
        .word { display: inline-block; opacity: 0; transform: translateY(30px) scale(0.8); }
        .slide.active .word { animation: wordFadeIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
         
        .price-tag { font-size: 24px; color: #ff8c00; font-weight: bold; background: rgba(0,0,0,0.4); padding: 2px 18px; border-radius: 35px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 1px solid rgba(255, 140, 0, 0.3); }

        .ticker { position: absolute; bottom: 0; left: 0; width: 100%; height: 110px; background: rgba(0,0,0,.25); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center; }
        .ticker-static { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-size: 28px; font-weight: 800; letter-spacing: 1px; }

        .footer { height: 150px; display: grid; grid-template-columns: 360px 1fr 200px; gap: 16px; }
         
        .weather-card { border-radius: 36px; background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; }
        .weather-inner { display: flex; align-items: center; }
        .weather-icon { width: 75px; height: 75px; margin-right: 15px; position: relative; }
        .temp { font-size: 30px; font-weight: 700; white-space: nowrap; } 
        .location { font-size: 18px; opacity: .8; }

        .review-card { padding: 10px 15px; width: 100%; }
        .review-grid { display: flex; width: 100%; justify-content: space-evenly; align-items: center; }
        .review-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .score { font-weight: 800; font-size: 19px; color: white; margin-top: 3px; text-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        .score small { font-size: 12px; opacity: 0.7; margin-left: 2px; }
        .item-stars { font-size: 12px; letter-spacing: 2px; filter: drop-shadow(0 2px 4px rgba(255, 215, 0, 0.4)); }
         
        .brand-logo { height: 38px; width: auto; max-width: 110px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.5)); animation: float 20s ease-in-out infinite; }
        .review-item:nth-child(1) .brand-logo { animation-delay: 0s; }
        .review-item:nth-child(2) .brand-logo { animation-delay: 0.5s; }
        .review-item:nth-child(3) .brand-logo { animation-delay: 1s; }

        .currency-card { border-radius: 36px; background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 0 20px; }
        .currency-item { display: flex; justify-content: space-between; width: 100%; font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .currency-item span:first-child { color: #ff8c00; }
        .currency-item span:last-child { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* Yumuşak ve lüks bir renk akışı sağlayan yeni animasyon rotası */
        @keyframes gradientWave {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-4%, -4%) scale(1.04); }
            50% { transform: translate(-2%, -6%) scale(1.02); }
            75% { transform: translate(-5%, -2%) scale(1.05); }
        }

        @keyframes float { 0%, 100% { transform: translateY(0) translateZ(0); } 50% { transform: translateY(-20px) translateZ(0); } }
        @keyframes wordFadeIn { to { opacity: 1; transform: translateY(0) scale(1) translateZ(0); } }
        @keyframes randomGlow { 0% { opacity: 0; transform: scale(0.5) translateY(0) translateZ(0); } 50% { opacity: 1; transform: scale(4.5) translateY(-30px) translateZ(0); } 100% { opacity: 0; transform: scale(0.5) translateY(-60px) translateZ(0); } }
         
        .icon-sun { width: 48px; height: 48px; background: #ffd54f; border-radius: 50%; position: absolute; top: 13px; left: 13px; box-shadow: 0 0 20px #ffd54f; animation: pulseIcon 3s ease infinite; transform: translateZ(0); }
        .icon-moon { width: 40px; height: 40px; border-radius: 50%; position: absolute; top: 15px; left: 15px; box-shadow: inset -10px -8px 0 0 #e2e8f0; animation: pulseIcon 4s ease infinite; transform: translateZ(0); }
        .icon-cloud { width: 50px; height: 18px; background: #f8fafc; border-radius: 20px; position: absolute; top: 35px; left: 10px; box-shadow: 0 0 15px rgba(255,255,255,0.4); animation: floatIcon 4s ease-in-out infinite; transform: translateZ(0); }
        .icon-cloud::before { content: ''; position: absolute; width: 22px; height: 22px; background: inherit; border-radius: 50%; top: -12px; left: 8px; }
        .icon-cloud::after { content: ''; position: absolute; width: 16px; height: 16px; background: inherit; border-radius: 50%; top: -8px; right: 8px; }
        .icon-rain { position: absolute; width: 3px; height: 8px; background: #00d4ff; top: 45px; left: 22px; box-shadow: 10px 0 0 #00d4ff, 20px 0 0 #00d4ff; animation: rainDrop 0.8s linear infinite; transform: translateZ(0); }
        .icon-wind { position: absolute; width: 25px; height: 2px; background: rgba(255,255,255,0.8); top: 38px; left: 15px; border-radius: 2px; box-shadow: -15px -8px 0 0 rgba(255,255,255,0.5), 10px 8px 0 0 rgba(255,255,255,0.6); animation: windBlow 1s linear infinite; transform: translateZ(0); }
        @keyframes pulseIcon { 0%,100%{transform: scale(1) translateZ(0);} 50%{transform: scale(1.08) translateZ(0);} }
        @keyframes floatIcon { 0%, 100% { transform: translateY(0) translateZ(0); } 50% { transform: translateY(-4px) translateZ(0); } }
        @keyframes rainDrop { 0% { transform: translateY(0) translateZ(0); opacity: 1; } 100% { transform: translateY(15px) translateZ(0); opacity: 0; } }
        @keyframes windBlow { 0% { transform: translateX(-10px) translateZ(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(15px) translateZ(0); opacity: 0; } }
    </style>
</head>

<body>
    <div class="background">
        <div class="particles-container" id="particlesContainer"></div>
    </div>

    <div class="dashboard theme-day" id="dashboard">
        <div class="header">
            <div class="tv-bug-container">
                <img src="logo.gif" border="0" width="1000" height="800" alt="Coastline Orange Hotel Logo" class="tv-bug-logo">
            </div>
            <div class="clocks">
                <div class="clock-card"><div class="clock-city">ANTALYA</div><div class="clock-time" id="antalyaTime">00:00</div></div>
                <div class="clock-card"><div class="clock-city">LONDON</div><div class="clock-time" id="londonTime">00:00</div></div>
                <div class="clock-card"><div class="clock-city">BERLIN</div><div class="clock-time" id="berlinTime">00:00</div></div>
                <div class="clock-card"><div class="clock-city">MOSCOW</div><div class="clock-time" id="moscowTime">00:00</div></div>
            </div>
        </div>

        <div class="main-panel">
            <div class="slider" id="dynamicSlider"></div>
            <div class="ticker">
                <div class="ticker-static">
                    <div>🍳 BREAKFAST 08:00 - 10:30 &nbsp; • &nbsp; 🍽️ RESTAURANT 12:00 - 22:00 &nbsp; • &nbsp; 🍹 LOBBY BAR 08:00 - 00:00</div>
                    <div>🏖️ POOL 08:00 - 20:00 &nbsp; • &nbsp; 💪 GYM 10:00 - 22:00</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="weather-card">
                <div class="weather-inner">
                    <div class="weather-icon" id="weatherIconContainer"></div>
                    <div><div class="temp" id="weatherTemp">--°C</div><div class="location">Antalya</div></div>
                </div>
            </div>

            <div class="weather-card review-card">
                <div class="review-grid">
                    <div class="review-item">
                        <img class="brand-logo" src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                        <div class="score">4.7<small>/5</small></div>
                        <div class="item-stars">⭐⭐⭐⭐⭐</div>
                    </div>
                    <div class="review-item">
                        <img class="brand-logo" src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/bookingdotcom/default.svg" alt="Booking.com">
                        <div class="score">9.1<small>/10</small></div>
                        <div class="item-stars">⭐⭐⭐⭐<span style="opacity:0.5">⭐</span></div> 
                    </div>
                    <div class="review-item">
                        <img class="brand-logo" src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/expedia/default.svg" alt="Expedia">
                        <div class="score">9.2<small>/10</small></div>
                        <div class="item-stars">⭐⭐⭐⭐<span style="opacity:0.5">⭐</span></div>
                    </div>
                </div>
            </div>

            <div class="currency-card">
                <div class="currency-item"><span>USD</span><span id="usdRate">--</span></div>
                <div class="currency-item"><span>EUR</span><span id="eurRate">--</span></div>
                <div class="currency-item"><span>GBP</span><span id="gbpRate">--</span></div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        
        // 1. MENÜ İÇERİKLERİ VE SLIDER
        try {
            const foodItems = [
                { title: "BEEF WRAP", price: "575.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/e3996b28-bb02-4919-842e-4a76b6e08587.jpeg" },
                { title: "COASTLINE BURGER", price: "550.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/d63031bb-8be5-4a98-8f67-6ad1f381aba6.jpeg" },
                { title: "COASTLINE PIZZA", price: "600.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/074d5fb2-e84b-44a3-b334-c7fff3ad861f.jpeg" },
                { title: "FETTUCINI ALFREDO", price: "450.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/66ab2e5d-c8f8-456c-b8b4-f129d008315f.jpeg" },
                { title: "MIXED TOAST", price: "300.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/821273d9-e170-4eee-b628-103fa1caa167.jpeg" },
                { title: "MEDITERRANEAN SALAD", price: "300.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/16ab700c-466a-413b-aba4-abf63102119e.jpg" },
                { title: "SAN SEBASTIAN", price: "250.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/c2d01d40-0310-4293-b0c6-5c87ce07d6eb.jpg" }
            ];

            const drinkItems = [
                { title: "MILKSHAKE", price: "250.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/6d1ef948-29c7-44bc-96c3-fabc575239d2.jpg" },
                { title: "NEGRONI", price: "450.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/f2b232bf-7a38-4c2b-bbbe-f3eb06497fe9.jpg" },
                { title: "APEROL SPRITZ", price: "420.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/3c4ce51c-7ade-44dd-b7c9-f74651cea216.jpg" },
                { title: "ESPRESSO MARTINI", price: "440.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/4aefb242-8c3c-4795-98f7-5221db67e096.jpg" },
                { title: "MOJITO", price: "430.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/c3c253fd-ec6b-44df-af9b-1a008c076a01.jpg" },
                { title: "SMOOTHIE", price: "250.00 ₺", image: "https://files.cdn.elektraweb.com/bdcac343/34135/images/0400dd6b-8458-4775-9997-9868969d0911.jpg" }
            ];

            const sliderContainer = document.getElementById("dynamicSlider");
            if(sliderContainer) {
                const maxItems = Math.max(foodItems.length, drinkItems.length);
                for (let i = 0; i < maxItems; i++) {
                    const food = foodItems[i % foodItems.length];
                    const drink = drinkItems[i % drinkItems.length];
                    const slideElement = document.createElement("div");
                    slideElement.className = `slide ${i === 0 ? "active" : ""}`;
                    
                    let drinkTitleHTML = "";
                    drink.title.split(" ").forEach((word, wordIndex) => {
                        let delay = 350 + ((wordIndex + 1) * 150);
                        drinkTitleHTML += `<span class="word" style="animation-delay: ${delay}ms">${word}</span>&nbsp;`;
                    });

                    let foodTitleHTML = "";
                    food.title.split(" ").forEach((word, wordIndex) => {
                        let delay = 350 + ((wordIndex + 1) * 150);
                        foodTitleHTML += `<span class="word" style="animation-delay: ${delay}ms">${word}</span>&nbsp;`;
                    });

                    slideElement.innerHTML = `
                        <div class="split-half left-half">
                            <img src="${drink.image}" alt="${drink.title}">
                            <div class="slide-content">
                                <h1>${drinkTitleHTML}</h1>
                                <div class="price-tag">${drink.price}</div>
                            </div>
                        </div>
                        <div class="split-half right-half">
                            <img src="${food.image}" alt="${food.title}">
                            <div class="slide-content">
                                <h1>${foodTitleHTML}</h1>
                                <div class="price-tag">${food.price}</div>
                            </div>
                        </div>
                    `;
                    sliderContainer.appendChild(slideElement);
                }
            }

            const dynamicSlides = document.querySelectorAll(".slide");
            let currentSlide = 0;
            setInterval(() => {
                if(dynamicSlides.length === 0) return;
                dynamicSlides[currentSlide].classList.remove("active");
                currentSlide = (currentSlide + 1) % dynamicSlides.length;
                dynamicSlides[currentSlide].classList.add("active");
            }, 7000);
        } catch(e) { console.error("Slider hatası:", e); }

        // 2. PARTİKÜL SİSTEMİ
        try {
            const container = document.getElementById("particlesContainer");
            if(container) {
                container.innerHTML = ''; 
                for(let i=0; i<10; i++) {
                    const particle = document.createElement("div");
                    particle.className = "particle";
                    const size = Math.random() * 20 + 10; 
                    particle.style.width = size + "px";
                    particle.style.height = size + "px";
                    particle.style.left = Math.random() * 100 + "vw";
                    particle.style.top = Math.random() * 100 + "vh"; 
                    particle.style.animationDelay = (Math.random() * 2) + "s";
                    particle.style.animationDuration = (Math.random() * 8 + 7) + "s";
                    container.appendChild(particle);
                }
            }
        } catch(e) { console.error("Partikül hatası:", e); }

        // 3. SAAT VE TEMA KONTROLÜ
        let timeOffset = 0;
        async function syncTimeWithAPI() {
            try {
                const response = await fetch("https://worldtimeapi.org/api/timezone/Europe/Istanbul");
                if(response.ok) {
                    const data = await response.json();
                    timeOffset = new Date(data.datetime).getTime() - new Date().getTime(); 
                }
            } catch(e) { console.log("Zaman API hatası."); }
            checkTheme(); 
        }

        function checkTheme() {
            try {
                const realTime = new Date(Date.now() + timeOffset);
                const hour = (realTime.getUTCHours() + 3) % 24;
                const body = document.body;
                if(hour >= 8 && hour < 20) {
                    body.classList.add("theme-day"); body.classList.remove("theme-night");
                } else {
                    body.classList.add("theme-night"); body.classList.remove("theme-day");
                }
            } catch(e) {}
        }     
        syncTimeWithAPI();
        setInterval(checkTheme, 60000);

        function updateClocks(){
            try {
                document.getElementById("antalyaTime").innerHTML = new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Istanbul"});
                document.getElementById("londonTime").innerHTML = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"});
                document.getElementById("berlinTime").innerHTML = new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Berlin"});
                document.getElementById("moscowTime").innerHTML = new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Moscow"});
            } catch(e) {}
        }
        setInterval(updateClocks, 1000);
        updateClocks();

        // 4. HAVA DURUMU SİSTEMİ (Open-Meteo)
        async function weather(){
            try {
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.8841&longitude=30.7056&current=temperature_2m,weather_code");
                if(response.ok) {
                    const data = await response.json();
                    const tempC = Math.round(data.current.temperature_2m);
                    const tempF = Math.round((tempC * 9/5) + 32);
                    
                    document.getElementById("weatherTemp").innerHTML = `${tempC}°C / ${tempF}°F`;
                    
                    const code = data.current.weather_code;
                    const isDaytime = ((new Date().getUTCHours() + 3) % 24) >= 8 && ((new Date().getUTCHours() + 3) % 24) < 20;
                    const iconContainer = document.getElementById("weatherIconContainer");
                    
                    let iconHTML = "";
                    if (code === 0) {
                        iconHTML = isDaytime ? '<div class="icon-sun"></div>' : '<div class="icon-moon"></div>';
                    } else if ([1, 2, 3].includes(code)) {
                        const bg = isDaytime ? '<div class="icon-sun" style="transform: scale(0.65); top: 5px; left: 25px; opacity: 0.6;"></div>' : '<div class="icon-moon" style="transform: scale(0.65); top: 5px; left: 25px; opacity: 0.6;"></div>';
                        iconHTML = bg + '<div class="icon-cloud"></div>';
                    } else if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) {
                        iconHTML = '<div class="icon-cloud" style="background:#cbd5e1;"></div><div class="icon-rain"></div>';
                    } else {
                        iconHTML = isDaytime ? '<div class="icon-sun"></div>' : '<div class="icon-moon"></div>';
                    }
                    iconContainer.innerHTML = iconHTML;
                }
            } catch(e) { console.error("Hava durumu hatası:", e); }
        }
        weather(); 
        setInterval(weather, 600000); 

        // 5. DÖVİZ KURLARI SİSTEMİ
        async function fetchRates() {
            try {
                const response = await fetch("https://open.er-api.com/v6/latest/USD");
                if(response.ok) {
                    const data = await response.json();
                    const tryRate = data.rates.TRY;
                    document.getElementById("usdRate").innerText = (tryRate - 0.40).toFixed(2);
                    document.getElementById("eurRate").innerText = (tryRate / data.rates.EUR - 0.40).toFixed(2);
                    document.getElementById("gbpRate").innerText = (tryRate / data.rates.GBP - 0.40).toFixed(2);
                }
            } catch(e) { console.error("Döviz hatası:", e); }
        }
        fetchRates(); 
        setInterval(fetchRates, 3600000);
        
        // RAM temizliği için saatlik yenileme
        setInterval(() => { window.location.reload(true); }, 3600000);
    });
    </script>
</body>
</html>
